<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    table{
        margin-top: 12%;
        border: 4px solid black;
    }
    .border{
        border: 1.5px solid black;
    }
    th, td{
        padding: 5px;
        padding-bottom: 2px;
        padding-left: 2px;
    }
    table, tr{
        padding: 4px;
    }
    td{
        padding-left: 5px;
    }
</style>
<body>
    <center><Table style="width: 60%;" cellspacing="6">
         <tbody>
            <tr height="60px">
                <td colspan="3" class="border">1</td>
                <td rowspan="3" class="border">2</td>
                <td colspan="2" class="border">3</td>
                <td rowspan="2" class="border">N</td>
                
            </tr>
            <tr height="60px">
                <td class="border">4</td>
                <td class="border">5</td>
                <td class="border">6</td>
                <td class="border">7</td>
                <td class="border">8</td>
            </tr>
            <tr height="60px">
                <td class="border" colspan="3">9</td>
                <td class="border" colspan="2">10</td>
                <td class="border">N</td>
            </tr>
            <tr height="60px">
                <td colspan="7" class="border" >N</td>
            </tr>
            <tr height="60px">
                <td class="border">N</td>
                <td class="border">N</td>
                <td class="border">N</td>
                <td class="border">N</td>
                <td class="border">N</td>
                <td class="border">N</td>
                <td class="border">N</td>
            </tr>
        
         </tbody>
    </Table></center>
</body>
</html>
