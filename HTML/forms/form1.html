<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
    <title>Registeration Form</title>
</head>
<body>
    <center>
        <table border="1">
            <thead>
            <tr class="gray2">
                <th colspan="4">
                    <center><h2>Registeration Form</h2></center>
                </th>
            </tr>
        </thead>
            <tbody class="gray">
                <tr>
                    <td>Student Name</td>
                    <td><input type="text" name="" id="" placeholder="First Name"></td>
                    <td><input type="text" name="" id="" placeholder="Middle Name"></td>
                    <td><input type="text" name="" id="" placeholder="Last Name"></td>
                </tr>
                <tr>
                    <td>Father's Name</td>
                    <td><input type="text" name="" id="" placeholder="Enter your father's Name"></td>
                    <td>Mother's Name</td>
                    <td><input type="text" name="" id="" placeholder="Enter your Mother's Name"></td>
                </tr>
                <tr>
                    <td>Date of Birth</td>
                    <td><input type="date" name="" id=""></td>
                    <td>Gender</td>
                    <td>Male<input type="radio" name="Gender" id="">
                        Female<input type="radio" name="Gender" id="">
                    </td>
                </tr>
                <tr>
                    <td>Category</td>
                    <td>Gen<input type="radio" name="Category" id="">
                        OBD<input type="radio" name="Category" id="">
                        SC/ST<input type="radio" name="Category" id="">
                    </td>
                    <td>Handicapped</td>
                    <td>Yes<input type="radio" name="Handicapped" id="">
                        No<input type="radio" name="Handicapped" id="">
                    </td>
                </tr>
                <tr>
                    <td>Ex-Serviceman</td>
                    <td>Yes<input type="radio" name="Ex-Serviceman" id="">
                    No<input type="radio" name="Ex-Serviceman" id="">
                    <td>EWS</td>
                    <td>Yes<input type="radio" name="EWS" id="">
                        No<input type="radio" name="EWS" id="">
                    </td>
                </td>
                </tr>
                <tr>
                    <td>Email ID</td>
                    <td><input type="text" name="" id=""></td>
                    <td>Mobile No.</td>
                    <td><input type="text" name="" id=""></td>
                </tr>
                <tr>
                    <td>State</td>
                    <td>
                            <select name="" id="">
                            <option value="" selected>Select any one</option>
                            <option value="">Punjab</option>
                            <option value="">Sindh</option>

                        </select>              
                    </td>
                    <td>City</td>
                    <td>
                        <select name="" id="">
                            <option value="" selected>Select any One</option>
                            <option value="">Islamabad</option>
                            <option value="">Lahore</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Upload Photo</td>
                    <td>
                        <input type="file" name="" id="">
                    </td>
                    <td>Upload Signature</td>
                    <td>
                        <input type="file" name="" id="">
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td colspan="3">
                        <center><button style="background-color: aqua; border-radius: 5px;">Submit</button></center>
                    </td>
                </tr>
        
            </tbody>
        </table>
    </center>
</body>
</html>
