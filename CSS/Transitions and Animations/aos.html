<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="
https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.min.css
" rel="stylesheet">
    <link rel="stylesheet" href="aos.css">
    <title>AOS - Animate on scroll library</title>
</head>
<body>
    <main>
        <div class="mainSection">
            <div class="wrapper">
                <div class="section1">
                    <div class="heading1">
                        <h1>AOS</h1>
                        <h2>Animate On Scroll Library</h2>
                    </div>
                    <div class="midSection1">
                        <p>Scroll down</p>
                        <p class="chevron">˅</p>
                    </div>
                    <div class="lowSection1">
                        <hr>
                        <p>Fade</p>
                        <hr>
                    </div>
                    
                </div>
                <div class="section2">
                    
                    <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent1Child singleCard">
                            <h1>Fade Up</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent2Child singleCard">
                            <h1>Fade Down</h1>
                        </div>
                    </div>

                </div>

                <div class="section3">
                    <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent3Child singleCard">
                            <h1>Fade Right</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent4Child singleCard">
                            <h1>Fade Left</h1>
                        </div>
                    </div>
                </div>

                <div class="section4">
                    <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent5Child singleCard">
                            <h1>Fade Up Right</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent6Child singleCard">
                            <h1>Fade Up Left</h1>
                        </div>
                    </div>
                </div>

                <div class="section5">
                    <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent7Child singleCard">
                            <h1>Fade Down Right</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent8Child singleCard">
                            <h1>Fade Down Left</h1>
                        </div>
                    </div>
                </div>

                <div class="lowSection2">
                        <hr>
                        <p>Flip</p>
                        <hr>
                    </div>

                    <div class="section6">
                        <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent9Child singleCard">
                            <h1>Flip Left</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent10Child singleCard">
                            <h1>Flip Right</h1>
                            
                        </div>
                    </div>
                    </div>

                    <div class="section7">
                        <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent11Child singleCard">
                            <h1>Flip Up</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent12Child singleCard">
                            <h1>Flip Down</h1>
                        </div>
                    </div>
                    </div>

                    <div class="lowSection3">
                        <hr>
                        <p>Zoom</p>
                        <hr>
                    </div>

                    <div class="section8">
                        <div class="parent1 childs">
                        <div data-aos-offset="100px" data-aos="custom" class="parent13Child singleCard">
                            <h1>Zoom In</h1>
                        </div>
                    </div>
                    <div class="parent2 childs">
                        <div data-aos-offset="100px" data-aos="custom"  class="parent14Child singleCard">
                            <h1>Zoom In Up</h1>
                        </div>
                    </div>
                    </div>
            </div>
        </div>
    </main>

    <script src="
https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.min.js
"></script>
<script>
    AOS.init({
        once:false,
    });
  </script>
</body>
</html>
