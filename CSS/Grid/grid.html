<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Grid</title>
</head>
<style>
    .parent{
        height: 95vh;
        background-color: black;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.5rem;
        grid-template-areas: 
        "first second second third third"
        "first forth fifth fifth sixth"
        "seventh eighth eighth ninth sixth"
        ;
    }
    .box{
        /* height: 200px; */
    }

    .box:nth-child(1){
        grid-area: first;
    }
    .box:nth-child(2){
        grid-area: second;
    }
    .box:nth-child(3){
        grid-area: third;
    }
    .box:nth-child(4){
        grid-area: forth;
    }
    .box:nth-child(5){
        grid-area: fifth;
    }
    .box:nth-child(6){
        grid-area: sixth;
    }
    .box:nth-child(7){
        grid-area: seventh;
    }
    .box:nth-child(8){
        grid-area: eighth;
    }
    .box:nth-child(9){
        grid-area: ninth;
    }
</style>
<body>
    <div class="parent">
        <div style="background-color: red;" class="box"></div>
        <div style="background-color: rgb(0, 174, 255);" class="box"></div>
        <div style="background-color: rgb(133, 133, 2);" class="box"></div>
        <div style="background-color: rgb(133, 133, 2);" class="box"></div>
        <div style="background-color: white;" class="box"></div>
        <div style="background-color: red;" class="box"></div>
        <div style="background-color: azure;" class="box"></div>
        <div style="background-color: red;" class="box"></div>
        <div style="background-color: rgb(0, 174, 255);" class="box"></div>
    </div>
</body>
</html>
