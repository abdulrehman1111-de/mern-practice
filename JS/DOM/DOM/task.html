<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Task Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #2d3748;
            --accent-color: #4a5568;
            --btn-bg: #3182ce;
            --btn-hover: #2b6cb0;
            --input-border: #cbd5e0;
            --list-item-bg: #edf2f7;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .dark-theme {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e2e8f0;
            --accent-color: #cbd5e0;
            --btn-bg: #319795;
            --btn-hover: #2c7a7b;
            --input-border: #4a5568;
            --list-item-bg: #2d3748;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .theme-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background-color: var(--accent-color);
            color: var(--container-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .dashboard-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent-color);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            background-color: var(--container-bg);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--btn-bg);
        }

        .add-btn {
            padding: 12px 20px;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .add-btn:hover {
            background-color: var(--btn-hover);
        }
        
        ul {
            list-style: none;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        li {
            background-color: var(--list-item-bg);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Task Dashboard</h1>
        
        <div class="input-group">
            <label for="task">What's on your mind?</label>
            <div class="input-wrapper">
                <input type="text" id="task" placeholder="Write your task here...">
                <button id="addTaskBtn" class="add-btn">Add Task</button>
            </div>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="task.js"></script>
</body>
</html>
